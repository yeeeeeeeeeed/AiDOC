server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    client_max_body_size 200M;

    # DRM Proxy
    location /proxy/ {
        proxy_pass http://drm-proxy:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSO callback rewrite → Next.js
    location ~ ^/api/auth/sso/(.*)$ {
        rewrite ^/api/auth/sso/(.*)$ /aidoc/api/auth/sso/$1 break;
        proxy_pass http://host.docker.internal:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI Backend
    location /aidoc-api/ {
        rewrite ^/aidoc-api/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Next.js Frontend
    location /aidoc {
        proxy_pass http://host.docker.internal:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
